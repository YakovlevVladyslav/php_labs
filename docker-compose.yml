version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: autofix_app
    restart: always
    # Docker сам выполнит эту команду в терминале контейнера при старте
    entrypoint: [ "sh", "-c", "composer install --no-interaction && php-fpm" ]
    volumes:
      - ./app:/var/www/html
      - /var/www/html/vendor # сохраняем vendor в анонимном volume
    networks:
      - autofix_network

  web:
    image: nginx:alpine
    container_name: autofix_web
    ports:
      - "8888:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - autofix_network

  db:
    image: mariadb:10.11
    container_name: autofix_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: autofix_db
      MYSQL_USER: autofix_user
      MYSQL_PASSWORD: autofix_password
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - autofix_network

volumes:
  db_data:

networks:
  autofix_network:
    driver: bridge